# /etc/nginx/sites-available/talkitln
# Nginx reverse proxy for TalkItLn
# Assumes SSL is already configured via Let's Encrypt / Certbot.
#
# Enable with:
#   sudo ln -sf /etc/nginx/sites-available/talkitln /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name talkitln.duckdns.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name talkitln.duckdns.org;

    # ── SSL (managed by Certbot — adjust paths if yours differ) ──
    ssl_certificate     /etc/letsencrypt/live/talkitln.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/talkitln.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Proxy timeouts (generous for WebSockets) ──
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    86400s;   # 24h — keeps WS connections alive

    # ── Common proxy headers ──
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Django API routes ──
    # Matches: /users/*, /questions/*, /chat/*, /notifications/*, /admin/*
    location ~ ^/(users|questions|chat|notifications|admin|static)/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── Django media files (uploaded chat files) ──
    location /chat_files/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── WebSocket routes ──
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Everything else → Next.js frontend ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Limits ──
    client_max_body_size 25M;
}
